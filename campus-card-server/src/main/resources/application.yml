spring:
  datasource:
    driver-class-name: org.opengauss.Driver
    url: jdbc:opengauss://localhost:15432/postgres?currentSchema=campus_card
    username: gaussdb
    password: OpenGauss@123

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 8
      timeout: 5000
      password: 123456

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

file:
  upload:
    path: upload
    url-prefix: /upload

alipay:
  sandbox:
    app-id: ${ALIPAY_SANDBOX_APP_ID:}
    private-key: ${ALIPAY_SANDBOX_PRIVATE_KEY:}
    alipay-public-key: ${ALIPAY_SANDBOX_PUBLIC_KEY:}
    gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
    return-url: ${ALIPAY_SANDBOX_RETURN_URL:http://localhost:8080/api/recharge/alipay/return}
    frontend-return-url: ${ALIPAY_FRONTEND_RETURN_URL:http://localhost:5173/profile}
    charset: UTF-8
    sign-type: RSA2

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080
