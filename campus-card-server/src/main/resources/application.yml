spring:
  datasource:
    driver-class-name: org.opengauss.Driver
    url: jdbc:opengauss://localhost:15432/postgres?currentSchema=campus_card
    username: gaussdb
    password: OpenGauss@123

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 8
      timeout: 5000
      password: 123456

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

file:
  upload:
    path: ./upload
    url-prefix: /upload 

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

